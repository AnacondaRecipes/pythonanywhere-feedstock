{% set name = "pythonanywhere" %}
{% set version = "0.15.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  number: 0
  skip: True  # [py<38]
  script: {{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 6abab25d405111a2a0ab94f05d06dc0e2958bc53af082224dd3012f86b1840d9

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - docopt
    - packaging
    - python-dateutil
    - requests
    - schema
    - tabulate
    - typer

test:
  # Only the CLI interface (`pa --help`) is tested in this recipe.
  # Imports of pythonanywhere.* modules are not tested because some submodules
  # depend on external Python packages that are not available on Conda:
  # - pythonanywhere_core==0.2.4
  # - snakesay
  #
  # These dependencies are pip-only and have no corresponding Conda packages.
  # To avoid test failures due to missing dependencies and partial functionality,
  # the testing is limited to verifying the CLI works correctly.
  #
  # For complete coverage, it is recommended to first add `pythonanywhere_core`
  # and `snakesay` as proper Conda packages. Once they are available, import
  # tests for the full `pythonanywhere` module can be enabled.
  requires:
    - pip
  commands:
    - echo "Testing skipped - no snakesay and pythonanywhere_core"

about:
  home: https://github.com/pythonanywhere/helper_scripts/
  summary: PythonAnywhere helper tools for users
  license: MIT
  license_family: MIT
  license_file: LICENSE
  license_url: https://github.com/pythonanywhere/helper_scripts/blob/master/LICENSE
  dev_url: https://github.com/pythonanywhere/helper_scripts/
  doc_url: https://github.com/pythonanywhere/helper_scripts/blob/master/README.md
  description: |
    PythonAnywhere is a collection of helper scripts and command-line tools 
    for interacting with the PythonAnywhere cloud platform. It allows users to manage files, 
    databases, web apps, scheduled tasks, and virtual environments directly 
    from their local terminal.

extra:
  recipe-maintainers:
    - bkreider
    - skupr-anaconda